name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # If your Hugging Face username is different from NAMANSAINI62, 
        # change NAMANSAINI62 to your actual Hugging Face username below!
        run: git push --force https://NAMANSAINI62:$HF_TOKEN@huggingface.co/spaces/NAMANSAINI62/super-ai-transcript main
